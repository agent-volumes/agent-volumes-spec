<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="250">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    
    <linearGradient id="leftPage" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    
    <linearGradient id="rightPage" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <linearGradient id="brightAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="250" rx="30" fill="url(#bg)"/>

  <g transform="translate(170, 135) scale(0.8)">
    
    <path d="M 0 60 L -140 -10 L -100 -100 L 0 -30 Z" fill="url(#leftPage)" opacity="0.1"/>
    <path d="M 0 60 L 140 -10 L 100 -100 L 0 -30 Z" fill="url(#rightPage)" opacity="0.1"/>

    <path d="M 0 100 L -160 20 L -120 -80 L 0 0 Z" fill="none" stroke="url(#leftPage)" stroke-width="8" stroke-linejoin="round" opacity="0.8"/>
    <path d="M 0 100 L 160 20 L 120 -80 L 0 0 Z" fill="none" stroke="url(#rightPage)" stroke-width="8" stroke-linejoin="round" opacity="0.8"/>

    <line x1="0" y1="100" x2="0" y2="0" stroke="url(#brightAccent)" stroke-width="8" stroke-linecap="round"/>

    <rect x="-5" y="-132" width="10" height="12" rx="2" fill="#ffffff" filter="url(#glow)"/>

    <g transform="translate(0, -110) rotate(-30)">
       <polygon points="-6,14 6,14 4,80 -4,80" fill="url(#leftPage)"/>
       <polygon points="-2,80 2,80 0,120" fill="#a855f7"/>
       <rect x="-5" y="77" width="10" height="6" rx="1" fill="#ffffff" opacity="0.9"/>
    </g>

    <g transform="translate(0, -110) rotate(30)">
       <polygon points="-6,14 6,14 4,80 -4,80" fill="url(#rightPage)"/>
       <polygon points="-2,80 2,80 0,120" fill="#06b6d4"/>
       <rect x="-5" y="77" width="10" height="6" rx="1" fill="#ffffff" opacity="0.9"/>
    </g>

    <g transform="translate(0, -55)">
       <line x1="-38" y1="0" x2="38" y2="0" stroke="#ffffff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
       <circle cx="-31.75" cy="0" r="4.5" fill="#0f172a" stroke="#ffffff" stroke-width="2"/>
       <circle cx="31.75" cy="0" r="4.5" fill="#0f172a" stroke="#ffffff" stroke-width="2"/>
    </g>

    <circle cx="0" cy="-110" r="14" fill="#0f172a" stroke="#ffffff" stroke-width="6" filter="url(#glow)"/>
    <circle cx="0" cy="-110" r="4" fill="#ffffff"/>

    <circle cx="0" cy="100" r="10" fill="#ffffff" filter="url(#glow)"/>
    
    <circle cx="-160" cy="20" r="8" fill="#a855f7"/>
    <circle cx="160" cy="20" r="8" fill="#06b6d4"/>
    <circle cx="-120" cy="-80" r="8" fill="#6366f1"/>
    <circle cx="120" cy="-80" r="8" fill="#3b82f6"/>
  </g>

  <text x="340" y="125" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="4">AGENT VOLUMES</text>
  <text x="344" y="160" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#94a3b8" text-anchor="start" letter-spacing="12">ORGANIZATION</text>
</svg>
